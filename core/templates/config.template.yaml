  workspace_name: "Your Workspace"
  default_space_name: "Your Space"

lists:
  general_todo_list_id: "YOUR_GENERAL_TODO_LIST_ID"
  general_todo_list_name: "General To-Do List"
  ideas_list_id: "YOUR_IDEAS_LIST_ID"
  ideas_list_name: "[Ideas]"

